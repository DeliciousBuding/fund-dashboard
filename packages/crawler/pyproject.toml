[project]
name = "fund-crawler"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "akshare>=1.18.0",
    "pandas>=2.0.0",
    "openpyxl>=3.1.0",
    "rich>=13.0.0",
    "httpx>=0.27.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/fund_crawler"]
