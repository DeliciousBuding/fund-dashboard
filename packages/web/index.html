<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0090ba" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="/api" />
    <link rel="dns-prefetch" href="/api" />
    <link rel="icon" type="image/svg+xml" href="/ndaq.svg" />
    <link rel="apple-touch-icon" href="/ndaq.svg" />

    <meta name="apple-mobile-web-app-title" content="TokenDance" />
    <title>TokenDance Fund</title>
    <style>
      /* skip-link: visually hidden by default, slides into the top band only on
         keyboard focus (Tab). Mouse users never see it — this is the WCAG 2.4.1
         Bypass Blocks pattern. Previously unstyled, so the browser rendered it as
         a plain always-on link stranded at the top of the page. */
      .skip-link {
        position: fixed; top: -120px; left: 12px; z-index: 9999;
        padding: 9px 16px; background: #3172d9; color: #fff !important;
        border-radius: 8px; font-size: 13px; font-weight: 600;
        text-decoration: none; box-shadow: 0 6px 18px rgba(15,23,42,0.28);
        transition: top .15s ease;
      }
      .skip-link:focus { top: 12px; outline: 3px solid rgba(255,255,255,0.7); outline-offset: 2px; }
    </style>
  </head>
  <body>
    <a href="#main-content" class="skip-link">跳到主内容</a>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
