name: CI
on:
  push:
    branches: [master, main, refactor/v3.0-reshape]
  pull_request:
    branches: [master, main]
  workflow_dispatch:  # manual trigger — build images on any branch (e.g. MCP deploy)

jobs:
  workspace-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install server dependencies
        run: cd packages/server && bun install
      - name: Install web dependencies
        run: npm ci   # root install (npm workspaces — web lockfile removed, contracts is a workspace member)
      - name: Run workspace test script
        run: npm test

  test-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: cd packages/server && bun install
      - name: Run server unit tests
        run: cd packages/server && bun test __tests__/services/ __tests__/datasources/ __tests__/crawler/

  build-server:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install dependencies
        run: cd packages/server && bun install
      - name: Build server bundle
        run: cd packages/server && bun build main.ts --outdir dist --target bun

  test-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: npm ci   # root install (npm workspaces)
      - name: Run web tests
        run: cd packages/web && npx vitest run

  build-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install & build
        run: npm ci && cd packages/web && npm run build

  # ── Docker build & push to GHCR ────────────────────────────────

  build-and-push:
    needs: [workspace-test, test-server, build-server, test-web, build-web]  # test-e2e temporarily non-blocking — pre-existing v3.0 E2E drift (API shape), tracked as tech debt; re-enable once E2E realigned
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' || github.ref == 'refs/heads/refactor/v3.0-reshape'))
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web dist
        run: npm ci && cd packages/web && npm run build

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: true
          tags: |
            ghcr.io/deliciousbuding/fund-dashboard/backend:latest
            ghcr.io/deliciousbuding/fund-dashboard/backend:${{ github.sha }}

      - name: Build & push web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: true
          tags: |
            ghcr.io/deliciousbuding/fund-dashboard/web:latest
            ghcr.io/deliciousbuding/fund-dashboard/web:${{ github.sha }}

  # ── E2E (runs on PR + push, uses docker compose for real-env testing) ──

  test-e2e:
    needs: [build-web, build-server]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build web dist for image context
        run: npm ci && cd packages/web && npm run build

      - name: Build backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          push: false
          tags: fund-dashboard/backend:ci

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile.web
          push: false
          tags: fund-dashboard/web:ci

      - name: Start services via docker compose
        run: |
          docker compose -f deploy/docker-compose.ci.yml up -d
          echo "Waiting for backend to become healthy..."
          for i in $(seq 1 30); do
            if wget -q -O - http://localhost:8765/api/health 2>/dev/null | grep -q '"ok"'; then
              echo "Backend healthy after ${i}s"
              break
            fi
            sleep 1
          done
          echo "Waiting for web to become healthy..."
          for i in $(seq 1 30); do
            if wget -q --spider http://localhost:8080/ 2>/dev/null; then
              echo "Web healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Install Playwright
        run: cd packages/web && npx playwright install chromium

      - name: Run E2E tests
        run: cd packages/web && npx playwright test

      - name: Show docker logs on failure
        if: failure()
        run: docker compose -f deploy/docker-compose.ci.yml logs

      - name: Cleanup
        if: always()
        run: docker compose -f deploy/docker-compose.ci.yml down -v
